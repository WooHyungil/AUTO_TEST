version: "3.9"

services:
  backend:
    image: python:3.11-slim
    container_name: qa-backend
    working_dir: /app
    volumes:
      - ../../backend:/app
    command: bash -lc "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  frontend:
    image: node:22
    container_name: qa-frontend
    working_dir: /app
    volumes:
      - ../../frontend:/app
    command: bash -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - backend

  postgres:
    image: postgres:17
    container_name: qa-postgres
    environment:
      POSTGRES_DB: qa
      POSTGRES_USER: qa
      POSTGRES_PASSWORD: qa
    ports:
      - "5432:5432"

  redis:
    image: redis:8
    container_name: qa-redis
    ports:
      - "6379:6379"
